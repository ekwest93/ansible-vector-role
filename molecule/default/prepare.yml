---
- name: Prepare playbook
  hosts: all
  gather_facts: false
  become: false

  tasks:
    - name: Install Python
      raw: |
        if command -v dnf >/dev/null 2>&1; then
          dnf install -y python3
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update
          apt-get install -y python3
        fi
      changed_when: false

    - name: Gather facts
      setup:
